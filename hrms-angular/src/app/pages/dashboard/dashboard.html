<app-navbar></app-navbar>

<div class="dashboard-content">
  <div class="container-fluid py-5">
    <div class="row align-items-center mb-5">
      <div class="col-lg-7">
        <p
          class="text-uppercase text-secondary small mb-3"
          style="letter-spacing: 4px"
        >
          Human Resource Management
        </p>

        <h1 class="display-2 fw-light">
          Manage your <br />
          workforce <br />
          effortlessly.
        </h1>

        <p class="lead text-secondary mt-4 mb-5">
          Human Resource Management System built to simplify employee
          management, attendance tracking, leave requests and payroll.
          Everything you need in one clean dashboard.
        </p>

        @if(isAdmin()) {
        <button
          class="btn btn-dark px-5 py-3 me-3"
          (click)="goTo('/employees')">
          Manage Employees
        </button>
        }

        <button
          class="btn btn-outline-dark px-5 py-3"
          (click)="goTo('/attendance')"
        >
          Attendance
        </button>
      </div>
      <div class="col-lg-5 d-flex justify-content-center">
        <div
          style="width: 350px; height: 2px; background: #333; margin-top: 150px"
        ></div>
      </div>
    </div>
  </div>
</div>
