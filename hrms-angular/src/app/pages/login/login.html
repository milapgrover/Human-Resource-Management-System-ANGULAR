<div
  class="min-vh-100 d-flex justify-content-center align-items-center login-bg">

  <div class="card border-0 shadow-lg p-5 login-card">


    <div class="text-center mb-4">

      <div
        class="bg-primary rounded-circle d-inline-flex justify-content-center align-items-center logo-box">

        <i class="bi bi-person-workspace text-white logo-icon"></i>

      </div>

    </div>


    <h1 class="text-center text-primary fw-bold mb-2">
      HRMS Login
    </h1>

    <p class="text-center text-muted mb-4">
      Welcome Back
    </p>


    <div class="mb-3">

      <label class="form-label fw-semibold">
        Email
      </label>

      <input
        type="email"
        class="form-control form-control-lg"
        placeholder="Enter Email"
        [(ngModel)]="email"
        (keydown)="handleKeyPress($event)">

    </div>



    <div class="mb-4">

      <label class="form-label fw-semibold">
        Password
      </label>

      <input
        type="password"
        class="form-control form-control-lg"
        placeholder="Enter Password"
        [(ngModel)]="password"
        (keydown)="handleKeyPress($event)">

    </div>


    <button
      class="btn btn-primary btn-lg w-100"
      [disabled]="loading"
      (click)="login()">

      {{ loading ? 'Logging In...' : 'Login' }}

    </button>

  </div>

</div>
