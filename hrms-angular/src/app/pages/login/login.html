<div class="login-container">

  <div class="card border-0 login-card">

    <div class="text-center mb-4">
      <div class="logo-box">
        <i class="bi bi-person-workspace logo-icon"></i>
      </div>
    </div>

    <h2 class="text-center fw-bold mb-2 text-dark">
      HRMS Login
    </h2>

    <p class="text-center text-muted mb-4">
      Welcome Back
    </p>

    <div class="mb-3">
      <label class="form-label fw-semibold">Email</label>

      <input
        type="email"
        class="form-control"
        placeholder="Enter Email"
        [(ngModel)]="email"
        (keydown)="handleKeyPress($event)">
    </div>

    <div class="mb-4">
      <label class="form-label fw-semibold">Password</label>

      <input
        type="password"
        class="form-control"
        placeholder="Enter Password"
        [(ngModel)]="password"
        (keydown)="handleKeyPress($event)">
    </div>

    <button
      class="btn btn-dark w-100 login-btn"
      [disabled]="loading"
      (click)="login()">
      {{ loading ? 'Logging In...' : 'Login' }}
    </button>

  </div>

</div>
